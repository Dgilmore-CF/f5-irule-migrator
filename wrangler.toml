name = "f5-irule-migrator"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "f5-irule-migrator.dtg-lab.net", custom_domain = true }
]

[assets]
directory = "src/ui"
binding = "ASSETS"
# Run the worker first so we can apply security headers to every response
# (including static assets) and consolidate API routing.
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[limits]
cpu_ms = 100

[dev]
port = 8787

# ----------------------------------------------------------------------------
# Preview environment for PR-style deployments. Override the route in CI.
# ----------------------------------------------------------------------------
[env.preview]
name = "f5-irule-migrator-preview"

[env.preview.observability]
enabled = true
